<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Makerspace Staff Schedule </title>
<style>
:root{
  --navy:#1C2333;--navy2:#2d3a55;--bg:#F5F6F8;--card:#fff;
  --border:#E0E2E8;--text:#1C2333;--muted:#6B7280;
  --khbp-bg:#D6E8F7;--khbp-fg:#0D3F6E;
  --aycm-bg:#D5F0E5;--aycm-fg:#084D37;
  --aycn-bg:#E9E5FC;--aycn-fg:#31216B;
  --mob-bg:#FDEECE;--mob-fg:#6B3E00;
  --out-bg:#FDE0EB;--out-fg:#6B162F;
  --off-bg:#F0F0EE;--off-fg:#888;
  --red-bg:#FFD7D7;--red-fg:#8B0000;
  --grn-bg:#E8F5E9;--grn-fg:#1B5E20;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#lock{position:fixed;inset:0;background:#0F1623;display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#1A2035;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:2.5rem 2rem;width:320px;text-align:center}
.lock-icon{font-size:2.5rem;margin-bottom:1rem}
.lock-box h1{font-size:1.15rem;font-weight:700;color:#F1F5F9;margin-bottom:.35rem}
.lock-box p{font-size:.82rem;color:#64748B;margin-bottom:1.5rem}
.lock-input{width:100%;padding:.65rem 1rem;font-size:1.1rem;letter-spacing:.35em;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;text-align:center;background:rgba(255,255,255,.05);color:#fff;font-family:monospace;margin-bottom:.75rem}
.lock-input:focus{outline:none;border-color:#3B82F6}
.lock-btn{width:100%;padding:.7rem;background:#1A6FB5;color:#fff;border:none;border-radius:8px;font-size:.95rem;cursor:pointer;font-weight:600;font-family:inherit;transition:background .15s}
.lock-btn:hover{background:#1558a0}
.lock-err{color:#F87171;font-size:.8rem;margin-top:.5rem;min-height:1rem}
.lock-back{margin-top:1rem;font-size:.78rem;color:#475569;cursor:pointer;text-decoration:underline}
.lock-back:hover{color:#94A3B8}
#app{display:none}
header{background:var(--navy);color:#fff;padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
header h1{font-size:1rem;font-weight:600}
header p{font-size:.75rem;color:#9AABB8;margin-top:1px}
.hbadge{background:#F0B429;color:#5A3800;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.hbtns{display:flex;gap:8px;align-items:center}
.sync-status{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600}
.sync-ok{background:rgba(74,222,128,.15);color:#4ADE80;border:1px solid rgba(74,222,128,.3)}
.sync-saving{background:rgba(251,191,36,.15);color:#FBbf24;border:1px solid rgba(251,191,36,.3)}
.sync-err{background:rgba(248,113,113,.15);color:#F87171;border:1px solid rgba(248,113,113,.3)}
nav{background:var(--navy2);display:flex;overflow-x:auto}
.nav-btn{padding:.65rem 1.25rem;color:#CBD5E0;font-size:.85rem;cursor:pointer;border:none;background:transparent;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;font-family:inherit}
.nav-btn.active{color:#fff;border-bottom-color:#F0B429}
.nav-btn:hover{color:#fff}
main{padding:1.5rem}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.25rem;overflow:hidden}
.card-head{padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-head h2{font-size:.95rem;font-weight:600}
.card-body{padding:1.25rem}
.btn{padding:6px 14px;border-radius:6px;font-size:.82rem;cursor:pointer;border:1px solid var(--border);background:#fff;font-family:inherit;transition:all .1s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-primary:hover{background:var(--navy2)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-danger{color:#DC2626;border-color:#FCA5A5}.btn-danger:hover{background:#FFF5F5}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.78rem;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
input[type=text],select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;font-family:inherit;background:#fff;color:var(--text)}
input[type=text]:focus,select:focus{outline:none;border-color:#93C5FD}
.tbl-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:.8rem}
th,td{padding:7px 9px;border:1px solid var(--border);white-space:nowrap}
th{background:var(--navy);color:#fff;font-weight:500;text-align:center;position:sticky;top:0;z-index:10}
th.name-hd{text-align:left}
td.name-cell{font-weight:600;color:var(--navy);position:sticky;left:0;background:#fff;z-index:5;min-width:140px}
select.cell-sel{border:none;padding:2px 4px;font-size:.75rem;font-weight:600;border-radius:4px;cursor:pointer;width:100%;text-align:center;font-family:inherit}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;text-align:center}
.metric-val{font-size:1.6rem;font-weight:700;color:var(--navy)}
.metric-lbl{font-size:.72rem;color:var(--muted);margin-top:2px}
.brief-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.brief-day-card{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.brief-day-hd{padding:5px 8px;font-size:.72rem;font-weight:700;text-align:center;background:var(--navy);color:#fff}
.brief-loc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:.72rem;border-top:1px solid var(--border)}
.brief-loc-row.ok{background:var(--grn-bg)}.brief-loc-row.warn{background:var(--red-bg)}
.brief-count{font-weight:700;font-size:.85rem}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:5px;font-size:.75rem;font-weight:600}
.leg-dot{width:11px;height:11px;border-radius:3px}
.period-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.period-bar label{font-size:.82rem;color:var(--muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:30px;font-size:.85rem;z-index:9998;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}.toast.warn{background:#B91C1C}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-box">
    <div class="lock-icon">&#128272;</div>
    <h1>Admin access</h1>
    <p>Enter your password to manage the staff schedule</p>
    <input class="lock-input" type="password" id="pw-input" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" maxlength="32" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lock-btn" onclick="tryLogin()">Unlock admin panel</button>
    <div class="lock-err" id="pw-err"></div>
    <div class="lock-back" onclick="location.href='index.html'">&#8592; Back to portal</div>
  </div>
</div>

<div id="app">
<header>
  <div>
    <h1>&#9881;&#65039; Admin Panel &mdash; Staff Schedule</h1>
    <p><span class="live-dot"></span>Live sync via Firebase &middot; Max 6 days/week &middot; 29 Jun 2026</p>
  </div>
  <div class="hbtns">
    <span class="hbadge">Admin</span>
    <span class="sync-status sync-ok" id="sync-status">&#10003; Synced</span>
    <button class="btn-ghost" onclick="logout()">&#128274; Lock</button>
    <a href="index.html" class="btn-ghost" style="text-decoration:none">&#8592; Portal</a>
  </div>
</header>
<nav>
  <button class="nav-btn active" onclick="showTab('names',this)">&#128101; Names</button>
  <button class="nav-btn" onclick="showTab('schedule',this)">&#128197; Schedule</button>
  <button class="nav-btn" onclick="showTab('brief',this)">&#128202; Daily Brief</button>
  <button class="nav-btn" onclick="showTab('summary',this)">&#128200; Summary</button>
</nav>
<main>
  <div id="tab-names" class="section active">
    <div class="card">
      <div class="card-head"><h2>Employees</h2><button class="btn btn-primary" onclick="openAddEmp()">+ Add</button></div>
      <div class="card-body"><table style="max-width:480px">
        <thead><tr><th style="width:36px">#</th><th class="name-hd">Name</th><th style="width:90px">Actions</th></tr></thead>
        <tbody id="names-tbody"></tbody>
      </table></div>
    </div>
  </div>
  <div id="tab-schedule" class="section">
    <div class="period-bar">
      <label>Period:</label>
      <select id="period-sel" onchange="renderSchedule()"></select>
      <button class="btn btn-sm btn-primary" onclick="addMonth()">+ Add month</button>
      <button class="btn btn-sm btn-danger" onclick="deletePeriod()">🗑 Delete period</button>
      <button class="btn btn-sm" style="margin-left:auto;border-color:#FCA5A5;color:#991B1B" onclick="resetAll()">⚠ Reset all data</button>
    </div>
    <div class="legend" id="sched-legend"></div>
    <div class="card"><div class="card-body" style="padding:0"><div class="tbl-wrap" id="sched-wrap"></div></div></div>
  </div>
  <div id="tab-brief" class="section">
    <div class="period-bar"><label>Period:</label><select id="brief-period-sel" onchange="renderBrief()"></select></div>
    <div class="metrics" id="brief-metrics"></div>
    <div id="brief-content"></div>
    <p style="font-size:.78rem;color:#DC2626;margin-top:.5rem">&#9888; Red = below minimum. Fix in the Schedule tab.</p>
  </div>
  <div id="tab-summary" class="section">
    <div class="period-bar"><label>Period:</label><select id="sum-period-sel" onchange="renderSummary()"></select></div>
    <div id="summary-content"></div>
  </div>
</main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9MstqwrUM1b7SoENXq9wMbe_j10lWkiw",
  authDomain: "the-makerspace-staff.firebaseapp.com",
  databaseURL: "https://the-makerspace-staff-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "the-makerspace-staff",
  storageBucket: "the-makerspace-staff.firebasestorage.app",
  messagingSenderId: "1012535086057",
  appId: "1:1012535086057:web:619438ffe3dc3c3dd55978"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const schedRef = ref(db, 'rotation');

// ── Password ─────────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'Admin@2025';
const SESSION_KEY = 'rotation_admin_session';

window.tryLogin = function(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PASSWORD){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    startFirebase();
  } else {
    const err = document.getElementById('pw-err');
    err.textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw-input').value='';
    setTimeout(()=>err.textContent='',3000);
  }
};
window.logout = function(){
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
};
if(sessionStorage.getItem(SESSION_KEY)==='1'){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── Constants ────────────────────────────────────────────────────────────────
const LOCS=["KHBP","AYC Morning","AYC Night","Mobile Lab","Outreach","Aqaba","Day Off"];
const LOC_STYLE={
  "KHBP":       {bg:"#D6E8F7",fg:"#0D3F6E"},
  "AYC Morning":{bg:"#D5F0E5",fg:"#084D37"},
  "AYC Night":  {bg:"#E9E5FC",fg:"#31216B"},
  "Mobile Lab": {bg:"#FDEECE",fg:"#6B3E00"},
  "Outreach":   {bg:"#FDE0EB",fg:"#6B162F"},
  "Aqaba":      {bg:"#CFF4F4",fg:"#055160"},
  "Day Off":    {bg:"#F0F0EE",fg:"#888"},
};
const MIN_STAFF={"KHBP":2,"AYC Morning":1,"AYC Night":1,"Mobile Lab":2};
const DAY_ABBR=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  employees:["Ala'a Janbak","Mohammed Hinti","Bashar Al-zubi","Ghadeer AbuRashed",
             "Ahmad Shwayat","Ahmad Abu Ghazaleh","Momen Kamal","Ahmad Abu Slayeh",
             "Ismail Qashoue","Ahmad Fares","Murad Saadeh"],
  schedule:{},
  periods:[{label:"28 Jun – 31 Jul 2026",start:"2026-06-28",end:"2026-07-31"}]
};
let fbReady = false;
let saveTimer = null;

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(s==='saving'){el.className='sync-status sync-saving';el.textContent='&#8593; Saving...';}
  else if(s==='ok'){el.className='sync-status sync-ok';el.innerHTML='&#10003; Synced';}
  else{el.className='sync-status sync-err';el.textContent='&#9888; Error';}
}

function saveToFirebase(){
  setSyncStatus('saving');
  window._localSaveTs = Date.now();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    set(schedRef, state)
      .then(()=>{ window._localSaveTs = Date.now(); setSyncStatus('ok'); })
      .catch(()=>setSyncStatus('err'));
  }, 600);
}

function startFirebase(){
  onValue(schedRef, (snapshot)=>{
    const data = snapshot.val();
    if(data){
      state = data;
      if(!state.periods) state.periods=[{label:"28 Jun – 31 Jul 2026",start:"2026-06-28",end:"2026-07-31"}];
      if(!state.schedule) state.schedule={};
    }
    if(!fbReady){
      fbReady=true;
      renderNames();
      syncSels();
      setSyncStatus('ok');
    } else {
      // Remote update — re-render current tab
      const active=document.querySelector('.section.active')?.id?.replace('tab-','');
      if(active) ({names:renderNames,schedule:renderSchedule,brief:renderBrief,summary:renderSummary})[active]?.();
      syncSels();
      setSyncStatus('ok');
    }
  }, ()=>setSyncStatus('err'));
}

if(sessionStorage.getItem(SESSION_KEY)==='1') startFirebase();

// ── Date utils ───────────────────────────────────────────────────────────────
function fmtDate(d){return d.toISOString().slice(0,10)}
function parseDate(s){return new Date(s+'T00:00:00')}
function isSun(s){return parseDate(s).getDay()===0}
function dowName(s){return DAY_ABBR[parseDate(s).getDay()]}
function dayNum(s){return parseInt(s.slice(8))}
function dateRange(s,e){const a=[];let d=new Date(s+'T00:00:00');const end=new Date(e+'T00:00:00');while(d<=end){a.push(fmtDate(d));d=new Date(d.getTime()+86400000);}return a;}
function toWeeks(dates){const w=[];let wk=[];for(const d of dates){if(isSun(d)&&wk.length){w.push(wk);wk=[];}wk.push(d);}if(wk.length)w.push(wk);return w;}
function getAssign(date,ei){return state.schedule[`${date}:${ei}`]||'Day Off';}
function setAssign(date,ei,loc){state.schedule[`${date}:${ei}`]=loc;saveToFirebase();}
function getWeekDays(ei,wk){return wk.filter(d=>getAssign(d,ei)!=='Day Off').length;}

// ── Tab ──────────────────────────────────────────────────────────────────────
window.showTab = function(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  ({names:renderNames,schedule:()=>{syncSels();renderSchedule()},brief:()=>{syncSels();renderBrief()},summary:()=>{syncSels();renderSummary()}})[name]?.();
};
function syncSels(){
  if(!state || !state.periods) return;
  ['period-sel','brief-period-sel','sum-period-sel'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    const v=parseInt(s.value)||0;
    s.innerHTML=state.periods.map((p,i)=>`<option value="${i}">${p.label}</option>`).join('');
    s.value = String(Math.min(Math.max(v,0), state.periods.length-1));
  });
}
function curPeriod(id){const i=parseInt(document.getElementById(id)?.value||0);return state.periods[i]||state.periods[0];}

// ── Add month ────────────────────────────────────────────────────────────────
// Helper: build a period spanning a full calendar month
function makeMonthPeriod(year, monthIdx){
  // monthIdx is 0-based: 0=Jan, 11=Dec
  const startDate = new Date(year, monthIdx, 1);
  const endDate = new Date(year, monthIdx+1, 0); // last day of month
  const startStr = fmtDate(startDate);
  const endStr = fmtDate(endDate);
  const label = `${startDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} – ${endDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  return {label, start:startStr, end:endStr};
}

window.addMonth = function(){
  if(!state.periods || state.periods.length===0){
    state.periods = [makeMonthPeriod(2026, 5)]; // June 2026 default
  }
  const last = state.periods[state.periods.length-1];
  // Parse the last period's end date and find the next calendar month
  const lastEnd = new Date(last.end+'T00:00:00');
  let nextYear = lastEnd.getFullYear();
  let nextMonth = lastEnd.getMonth() + 1; // next month after last end's month
  // If last end is on the very last day of its month, we want the FOLLOWING month
  // (e.g. last end Jul 31 → new period = Aug)
  // If last end is mid-month (shouldn't happen but safe), still go to next month
  if(nextMonth > 11){ nextMonth = 0; nextYear++; }
  const newPeriod = makeMonthPeriod(nextYear, nextMonth);
  state.periods.push(newPeriod);
  const newIdx = state.periods.length-1;
  saveToFirebase();
  // Force all period dropdowns to refresh and show the new month
  ['period-sel','brief-period-sel','sum-period-sel'].forEach(id=>{
    const s=document.getElementById(id); if(!s) return;
    s.innerHTML = state.periods.map((p,i)=>`<option value="${i}">${p.label}</option>`).join('');
    s.value = String(newIdx);
  });
  renderSchedule();
  toast('Added: '+newPeriod.label);
};

window.deletePeriod = function(){
  if(state.periods.length <= 1){
    toast('Cannot delete the last remaining period', true);
    return;
  }
  const sel = document.getElementById('period-sel');
  const idx = parseInt(sel.value) || 0;
  const p = state.periods[idx];
  if(!confirm(`Delete period "${p.label}"? Any schedule data for these dates will also be removed.`)) return;
  // Remove the period
  state.periods.splice(idx, 1);
  // Remove schedule entries for those dates
  const datesToRemove = dateRange(p.start, p.end);
  datesToRemove.forEach(d=>{
    Object.keys(state.schedule).forEach(k=>{
      if(k.startsWith(d+':')) delete state.schedule[k];
    });
  });
  saveToFirebase();
  ['period-sel','brief-period-sel','sum-period-sel'].forEach(id=>{
    const s=document.getElementById(id); if(!s) return;
    s.innerHTML = state.periods.map((p,i)=>`<option value="${i}">${p.label}</option>`).join('');
    s.value = '0';
  });
  renderSchedule();
  toast('Deleted: '+p.label);
};

window.resetAll = function(){
  if(!confirm('⚠ This will WIPE all schedule data and reset to the default June 2026 period. Continue?')) return;
  if(!confirm('Are you ABSOLUTELY sure? This cannot be undone.')) return;
  state = {
    employees: state.employees || ["Ala'a Janbak","Mohammed Hinti","Bashar Al-zubi","Ghadeer AbuRashed","Ahmad Shwayat","Ahmad Abu Ghazaleh","Momen Kamal","Ahmad Abu Slayeh","Ismail Qashoue","Ahmad Fares","Murad Saadeh"],
    schedule: {},
    periods: [makeMonthPeriod(2026, 5)] // June 2026
  };
  saveToFirebase();
  ['period-sel','brief-period-sel','sum-period-sel'].forEach(id=>{
    const s=document.getElementById(id); if(!s) return;
    s.innerHTML = state.periods.map((p,i)=>`<option value="${i}">${p.label}</option>`).join('');
    s.value = '0';
  });
  renderNames();
  renderSchedule();
  toast('Reset complete. Fresh June 2026 period created.');
};

// ── Names ────────────────────────────────────────────────────────────────────
function renderNames(){
  document.getElementById('names-tbody').innerHTML=state.employees.map((n,i)=>`
    <tr><td style="text-align:center;color:var(--muted)">${i+1}</td><td>${n}</td>
    <td style="text-align:center"><button class="btn btn-sm" onclick="editEmp(${i})">&#9999;&#65039;</button> <button class="btn btn-sm btn-danger" onclick="delEmp(${i})">&#128465;</button></td></tr>`).join('');
}
window.openAddEmp = function(){showModal(`<h3 style="margin-bottom:1rem;font-size:1rem">Add employee</h3>
  <input type="text" id="f-name" placeholder="Full name" style="width:100%;margin-bottom:1rem">
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEmp()">Add</button></div>`);};
window.editEmp = function(i){showModal(`<h3 style="margin-bottom:1rem;font-size:1rem">Edit name</h3>
  <input type="text" id="f-name" value="${state.employees[i]}" style="width:100%;margin-bottom:1rem">
  <div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEmp(${i})">Save</button></div>`);};
window.saveEmp = function(i){const n=document.getElementById('f-name').value.trim();if(!n)return;if(i!==undefined)state.employees[i]=n;else state.employees.push(n);saveToFirebase();closeModal();renderNames();};
window.delEmp = function(i){if(!confirm(`Remove "${state.employees[i]}"?`))return;state.employees.splice(i,1);saveToFirebase();renderNames();};

// ── Schedule ─────────────────────────────────────────────────────────────────
function renderSchedule(){
  const p=curPeriod('period-sel');
  const dates=dateRange(p.start,p.end);
  const weeks=toWeeks(dates);
  const N=state.employees.length;
  document.getElementById('sched-legend').innerHTML=Object.entries(LOC_STYLE).map(([loc,{bg,fg}])=>
    `<div class="leg"><div class="leg-dot" style="background:${bg};border:1px solid ${fg}40"></div>${loc}</div>`).join('');
  let hdr1='<tr><th class="name-hd" rowspan="2" style="position:sticky;left:0;z-index:20;min-width:140px">Employee</th>';
  weeks.forEach((wk,wi)=>{
    hdr1+=`<th colspan="${wk.length}" style="background:#2d3a55">${parseDate(wk[0]).toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${parseDate(wk[wk.length-1]).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</th>`;
    hdr1+=`<th rowspan="2" style="background:#444;width:34px;font-size:.7rem">W${wi+1}</th>`;
  });
  hdr1+='</tr><tr>';
  weeks.forEach(wk=>wk.forEach(d=>{
    hdr1+=`<th style="background:var(--navy);color:#fff;font-size:.72rem;min-width:50px">${dayNum(d)}<br>${dowName(d)}</th>`;
  }));
  hdr1+='</tr>';
  let tbody='';
  for(let ei=0;ei<N;ei++){
    tbody+=`<tr><td class="name-cell">${state.employees[ei]}</td>`;
    weeks.forEach((wk,wi)=>{
      let wkN=0;
      wk.forEach(d=>{
        const a=getAssign(d,ei);const s=LOC_STYLE[a]||LOC_STYLE["Day Off"];
        if(a!=='Day Off')wkN++;
        tbody+=`<td style="padding:2px;background:${s.bg}"><select class="cell-sel" style="background:${s.bg};color:${s.fg}" onchange="onCell(this,'${d}',${ei})">
          ${LOCS.map(l=>`<option value="${l}"${a===l?' selected':''}>${l}</option>`).join('')}</select></td>`;
      });
      const over=wkN>6;
      tbody+=`<td style="text-align:center;font-weight:700;font-size:.85rem;background:${over?'var(--red-bg)':'var(--grn-bg)'};color:${over?'var(--red-fg)':'var(--grn-fg)'}">${wkN}</td>`;
    });
    tbody+='</tr>';
  }
  document.getElementById('sched-wrap').innerHTML=`<table><thead>${hdr1}</thead><tbody>${tbody}</tbody></table>`;
}
window.onCell = function(sel,date,ei){
  const val=sel.value;
  const p=curPeriod('period-sel');
  const weeks=toWeeks(dateRange(p.start,p.end));
  setAssign(date,ei,val);
  const s=LOC_STYLE[val]||LOC_STYLE["Day Off"];
  sel.style.background=s.bg;sel.style.color=s.fg;sel.parentElement.style.background=s.bg;
  const wk=weeks.find(w=>w.includes(date))||[];
  const c=getWeekDays(ei,wk);
  if(c>6)toast(`&#9888; ${state.employees[ei]}: ${c} days this week — over limit!`,true);
  renderSchedule();
};

// ── Brief ────────────────────────────────────────────────────────────────────
function renderBrief(){
  const p=curPeriod('brief-period-sel');
  const dates=dateRange(p.start,p.end);
  const weeks=toWeeks(dates);
  const N=state.employees.length;
  const TRACK=["KHBP","AYC Morning","AYC Night","Mobile Lab","Outreach"];
  let issues=0;
  let html='';
  weeks.forEach((wk,wi)=>{
    html+=`<div style="margin-bottom:1.5rem"><h3 style="font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em">Week ${wi+1} &middot; ${parseDate(wk[0]).toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${parseDate(wk[wk.length-1]).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</h3><div class="brief-grid">`;
    wk.forEach(d=>{
      html+=`<div class="brief-day-card"><div class="brief-day-hd">${parseDate(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}<br>${dowName(d)}</div>`;
      let tot=0;
      TRACK.forEach(loc=>{
        const cnt=state.employees.filter((_,ei)=>getAssign(d,ei)===loc).length;
        const min=MIN_STAFF[loc]||0;const ok=!min||cnt>=min;
        if(!ok)issues++;
        if(cnt>0||min>0){
          html+=`<div class="brief-loc-row ${ok?'ok':'warn'}">
            <span style="font-size:.68rem">${loc.replace(' Morning',' AM').replace(' Night',' PM').replace('Mobile Lab','Mob.')}</span>
            <span class="brief-count">${cnt}${min?'/'+min:''}</span></div>`;
          tot+=cnt;
        }
      });
      html+=`<div class="brief-loc-row" style="border-top:2px solid var(--border);background:#f9f9f9"><span style="font-size:.68rem;font-weight:600">Total</span><span class="brief-count">${tot}</span></div>`;
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('brief-metrics').innerHTML=`
    <div class="metric"><div class="metric-val" style="color:${issues>0?'#DC2626':'#16A34A'}">${issues}</div><div class="metric-lbl">Staffing issues</div></div>
    <div class="metric"><div class="metric-val">${dates.length}</div><div class="metric-lbl">Days in period</div></div>
    <div class="metric"><div class="metric-val">${state.employees.length}</div><div class="metric-lbl">Employees</div></div>`;
  document.getElementById('brief-content').innerHTML=html;
}

// ── Summary ──────────────────────────────────────────────────────────────────
function renderSummary(){
  const p=curPeriod('sum-period-sel');
  const dates=dateRange(p.start,p.end);
  const weeks=toWeeks(dates);
  const N=state.employees.length;
  let html=`<div style="overflow-x:auto"><table><thead><tr>
    <th class="name-hd" style="position:sticky;left:0;background:var(--navy)">Employee</th>
    ${weeks.map((wk,wi)=>`<th>W${wi+1}<br><span style="font-weight:400;font-size:.68rem">${parseDate(wk[0]).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span></th>`).join('')}
    <th>Total</th></tr></thead><tbody>`;
  for(let ei=0;ei<N;ei++){
    let tot=0;
    const cells=weeks.map(wk=>{const c=getWeekDays(ei,wk);tot+=c;const over=c>6;
      return `<td style="text-align:center;font-weight:700;background:${over?'var(--red-bg)':c>0?'var(--grn-bg)':'var(--off-bg)'};color:${over?'var(--red-fg)':c>0?'var(--grn-fg)':'var(--off-fg)'}">${c}${over?' &#9888;':''}</td>`;
    }).join('');
    html+=`<tr><td class="name-cell" style="position:sticky;left:0">${state.employees[ei]}</td>${cells}<td style="text-align:center;font-weight:700">${tot}</td></tr>`;
  }
  html+='</tbody></table></div>';
  document.getElementById('summary-content').innerHTML=html;
}

// ── Modal / Toast ─────────────────────────────────────────────────────────────
window.showModal = function(html){document.getElementById('modal-root').innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9000" onclick="if(event.target===this)closeModal()"><div style="background:#fff;border-radius:12px;padding:1.5rem;width:340px;max-width:95vw">${html}</div></div>`;};
window.closeModal = function(){document.getElementById('modal-root').innerHTML='';};
let _tt;
window.toast = function(msg,warn=false){const t=document.getElementById('toast');t.innerHTML=msg;t.className='toast show'+(warn?' warn':'');clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',4000);};

</script>
</body>
</html>
